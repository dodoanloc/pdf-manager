<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản lý file tài sản Agribank Thọ Xuân</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --bg-glass: rgba(255, 255, 255, 0.30);
            --border-glass: rgba(255, 255, 255, 0.55);
            --text-primary: #1F2937;
            --text-secondary: #64748B;
            --error: #EF4444;
            --radius-lg: 24px;
            --radius: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background:
                radial-gradient(circle at 18px 18px, rgba(5,150,105,.075) 2px, transparent 2.8px),
                radial-gradient(circle at 58px 58px, rgba(134,239,172,.13) 2px, transparent 3px),
                linear-gradient(135deg, #f4fff8 0%, #e8f8ee 52%, #dff3e7 100%);
            background-size: 76px 76px, 76px 76px, auto;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
        }
        body::before {
            background: rgba(16, 185, 129, 0.22);
            top: -100px;
            right: -100px;
        }
        body::after {
            background: rgba(134, 239, 172, 0.28);
            bottom: -100px;
            left: -100px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            position: relative;
        }

        .login-card {
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1.5px solid rgba(5,150,105,.14);
            outline: 1px solid rgba(255,255,255,.56);
            border-radius: var(--radius-lg);
            padding: 50px 40px;
            box-shadow: 0 22px 55px rgba(5,150,105,.11), 0 8px 24px rgba(15,23,42,.08);
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #059669 0%, #10B981 55%, #047857 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
            color: #334155;
            font-size: 0.9rem;
            margin-left: 4px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 16px 20px;
            border: 1.5px solid rgba(5,150,105,.16);
            border-radius: var(--radius);
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.82);
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.50), 0 6px 18px rgba(15,23,42,.04);
        }

        input:focus {
            background: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 0 0 4px rgba(5,150,105,.12);
            border-color: rgba(5,150,105,.52);
        }

        input::placeholder {
            color: #94A3B8;
        }

        .btn {
            width: 100%;
            padding: 16px 28px;
            border: none;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            color: #ffffff;
            box-shadow: 0 10px 15px rgba(5,150,105,.16);
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(5,150,105,.22);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.10);
            backdrop-filter: blur(5px);
            color: #b91c1c;
            padding: 14px 18px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            font-size: 0.9rem;
            border-left: 4px solid var(--error);
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>📄 Asset Manager</h1>
                <p>Agribank Chi nhánh Thọ Xuân (3511)</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Nhập username..." required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn" id="loginBtn">Đăng nhập ngay</button>
            </form>
        </div>

        <div class="footer">
            © 2026 Agribank Thọ Xuân - Phát triển bởi Đỗ Doãn Lộc
        </div>
    </div>

    <script>
        // Tạo hiệu ứng hạt bay nhẹ
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 15; i++) {
            const particle = document.createElement('div');
            particle.style.position = 'absolute';
            particle.style.width = Math.random() * 10 + 5 + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = 'rgba(16,185,129,0.10)';
            particle.style.borderRadius = '50%';
            particle.style.top = Math.random() * 100 + 'vh';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animation = `float ${Math.random() * 10 + 10}s linear infinite`;
            particlesContainer.appendChild(particle);
        }

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            showError(''); // Hide error
            loginBtn.disabled = true;
            loginBtn.textContent = 'Đang xác thực...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.success) {
                    loginBtn.textContent = 'Thành công! Đang chuyển hướng...';
                    setTimeout(() => window.location.href = '/', 500);
                } else {
                    showError(result.error || 'Tên đăng nhập hoặc mật khẩu không đúng');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Đăng nhập ngay';
                }
            } catch (error) {
                showError('Lỗi kết nối Server. Vui lòng thử lại.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Đăng nhập ngay';
            }
        });

        function showError(message) {
            if (!message) {
                errorMessage.classList.remove('show');
                return;
            }
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        // Auto focus
        document.getElementById('username').focus();
    </script>
    
    <style>
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.35; }
            90% { opacity: 0.35; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</body>
</html>
